<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}NIDS Security Dashboard{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        /* CORE VARIABLES */
        :root {
            --bg-dark: #09090b;
            --bg-panel: #18181b;
            --accent-primary: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --accent-purple: #8b5cf6;
            --text-main: #ffffff;
            --text-muted: #f1f5f9;
            --border-subtle: #27272a;
        }

        /* OVERRIDE BOOTSTRAP DEFAULTS FOR LEGIBILITY */
        .text-muted, .text-secondary {
            color: rgba(255, 255, 255, 0.8) !important;
        }
        
        body, p, h1, h2, h3, h4, h5, h6, label, td, th, span {
            color: #ffffff !important;
        }

        /* GLOBAL STYLES */
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* CUSTOM UTILITIES */
        .text-gradient {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .glass-panel {
            background: rgba(24, 24, 27, 0.7) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-subtle) !important;
        }

        .premium-card {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .premium-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px var(--accent-glow);
            border-color: var(--accent-primary);
        }

        /* NAVBAR */
        .navbar-premium {
            background: rgba(9, 9, 11, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-subtle);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--text-main) !important;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-link {
            color: var(--text-muted) !important;
            font-weight: 600;
            padding: 8px 16px !important;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--text-main) !important;
            background: rgba(59, 130, 246, 0.1);
        }

        /* MAIN WRAPPER */
        #content-wrap {
            flex: 1;
            padding: 40px 0;
        }

        /* BUTTONS */
        .btn-gradient {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-purple));
            color: white;
            border: none;
            font-weight: 600;
            padding: 10px 24px;
            border-radius: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-gradient:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px var(--accent-glow);
            color: white;
        }

        /* CUSTOM SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-dark); 
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-subtle); 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-primary); 
        }

        /* FOOTER */
        footer {
            background-color: var(--bg-panel);
            border-top: 1px solid var(--border-subtle);
            padding: 1.5rem 0;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-premium">
        <div class="container-fluid max-w-7xl">
            <a class="navbar-brand" href="{{ url_for('home') }}">
                <i class="bi bi-shield-lock text-primary fs-3"></i>
                <span class="text-gradient">NIDS Core</span>
            </a>
            
            <button class="navbar-toggler navbar-dark border-0" type="button" data-bs-toggle="collapse" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav gap-2">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('home') }}"><i class="bi bi-house me-1"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('predicting') }}"><i class="bi bi-activity me-1"></i> Analyze Traffic</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('model') }}"><i class="bi bi-cpu-fill me-1"></i> Core Integrity</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- CONTENT WRAPPER -->
    <main id="content-wrap" class="container">
        {% block content %}{% endblock %}
    </main>

    <!-- FOOTER -->
    <footer>
        <div class="container">
            <p class="mb-0">&copy; <script>document.write(new Date().getFullYear())</script> Network Intrusion Detection System. All secure.</p>
        </div>
    </footer>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Set active class dynamically
        const currentLocation = location.href;
        const menuItem = document.querySelectorAll('.nav-link');
        const menuLength = menuItem.length;
        for (let i = 0; i < menuLength; i++) {
            if (menuItem[i].href === currentLocation) {
                menuItem[i].className += " active";
            }
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
